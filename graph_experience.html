        // 扁平化分类节点（与之前相同）
        let allCategories = [];
        function flattenTree(node, path = [], level = 1) {
            const code = node.code;
            const fullPath = [...path, node.name];
            allCategories.push({
                code, name: node.name, level,
                keywords: node.keywords || [],
                parent: path.length ? path[path.length-1] : null,
                fullPath
            });
            if (node.children) {
                for (let child of node.children) {
                    flattenTree(child, fullPath, level+1);
                }
            }
        }
        // 使用实际分类树，这里用 TEMP 做演示，实际需替换为完整 CATEGORY_TREE
        TEMP_CATEGORY_TREE.forEach(root => flattenTree(root, [], 1));

        // 获取节点分类（返回分类代码）
        function getNodeCategory(node) {
            const text = (node.name + ' ' + (node.summary || '')).toLowerCase();
            let best = null;
            let maxLevel = -1;
            for (let cat of allCategories) {
                if (cat.code === 'other') continue;
                for (let kw of cat.keywords) {
                    if (text.includes(kw.toLowerCase())) {
                        if (cat.level > maxLevel) {
                            maxLevel = cat.level;
                            best = cat.code;
                        }
                        break;
                    }
                }
            }
            return best || 'other';
        }

        // 获取分类路径
        function getCategoryPath(code) {
            const cat = allCategories.find(c => c.code === code);
            if (!cat) return [];
            let path = [];
            let cur = cat;
            while (cur) {
                path.unshift(cur.code);
                const parent = allCategories.find(c => c.name === cur.parent);
                cur = parent;
            }
            return path;
        }

        // 颜色映射（一级主色相）
        const MAIN_HUES = {
            tech: 200, life: 90, entertainment: 0, game: 30, education: 280, business: 45,
            automobile: 180, sports: 160, fashion: 350, other: 0
        };

        // 根据节点生成颜色（一级主色相 + 二级偏移）
        function getNodeColor(node) {
            const code = getNodeCategory(node);
            const path = getCategoryPath(code);
            const firstLevel = path[0] || 'other';
            const baseHue = MAIN_HUES[firstLevel] || 0;
            let secondHueOffset = 0;
            if (path.length >= 2) {
                const secondCode = path[1];
                let hash = 0;
                for (let i = 0; i < secondCode.length; i++) {
                    hash = ((hash << 5) - hash) + secondCode.charCodeAt(i);
                    hash |= 0;
                }
                secondHueOffset = (hash % 31) - 15;
            }
            const hue = (baseHue + secondHueOffset + 360) % 360;
            if (firstLevel === 'other') return `hsl(0, 0%, 60%)`;
            return `hsl(${hue}, 65%, 60%)`;
        }

        function computeDegrees(graphData) {
            const deg = new Map();
            graphData.links.forEach(l => {
                deg.set(l.source, (deg.get(l.source) || 0) + 1);
                deg.set(l.target, (deg.get(l.target) || 0) + 1);
            });
            return deg;
        }

        function showNodeDetail(node) {
            const panel = document.getElementById('info-panel');
            if (!panel) return;
            document.getElementById('node-title').innerText = node.name || '无标题';
            document.getElementById('node-summary').innerText = node.summary || '暂无摘要';
            document.getElementById('node-link').href = `https://www.bilibili.com/video/${node.id}`;
            panel.style.display = 'block';
        }

        function getMockHotValue(node) {
            let hash = 0;
            for (let i = 0; i < node.id.length; i++) hash = ((hash << 5) - hash) + node.id.charCodeAt(i);
            return 0.3 + (Math.abs(hash) % 70) / 100;
        }

        let Graph;
        let currentGraphData = { nodes: [], links: [] };
        let currentLevel1 = 'all', currentLevel2 = 'all', currentLevel3 = 'all', currentLevel4 = 'all';
        let currentSort = 'default';
        let currentKeyword = '';
        let currentAuthors = new Set();
        let selectedTags = new Set();
        let currentUIMode = 'limited';

        function getFilteredData() {
            let filtered = [...currentGraphData.nodes];
            if (currentLevel1 !== 'all') {
                filtered = filtered.filter(node => {
                    const code = getNodeCategory(node);
                    const path = getCategoryPath(code);
                    if (currentLevel2 !== 'all') {
                        if (currentLevel3 !== 'all') {
                            if (currentLevel4 !== 'all') {
                                return path[0] === currentLevel1 && path[1] === currentLevel2 && path[2] === currentLevel3 && path[3] === currentLevel4;
                            }
                            return path[0] === currentLevel1 && path[1] === currentLevel2 && path[2] === currentLevel3;
                        }
                        return path[0] === currentLevel1 && path[1] === currentLevel2;
                    }
                    return path[0] === currentLevel1;
                });
            }
            if (selectedTags.size > 0) {
                filtered = filtered.filter(node => {
                    const code = getNodeCategory(node);
                    const path = getCategoryPath(code);
                    for (let tag of selectedTags) {
                        if (!path.includes(tag)) return false;
                    }
                    return true;
                });
            }
            if (currentAuthors.size > 0) {
                filtered = filtered.filter(n => currentAuthors.has(n.author));
            }
            if (currentKeyword.trim()) {
                const kw = currentKeyword.toLowerCase();
                filtered = filtered.filter(n => n.name.toLowerCase().includes(kw) || (n.summary && n.summary.toLowerCase().includes(kw)));
            }
            const ids = new Set(filtered.map(n => n.id));
            const links = currentGraphData.links.filter(l => ids.has(l.source) && ids.has(l.target));
            return { nodes: filtered, links };
        }

        function updateGraph() {
            if (!Graph) return;
            // 保存当前位置和固定属性
            const posMap = new Map();
            const currNodes = Graph.graphData().nodes;
            if (currNodes) {
                currNodes.forEach(node => {
                    if (node.x !== undefined) {
                        posMap.set(node.id, {
                            x: node.x, y: node.y, z: node.z,
                            fx: node.fx, fy: node.fy, fz: node.fz
                        });
                    }
                });
            }
            const filtered = getFilteredData();
            Graph.graphData(filtered);
            const newNodes = Graph.graphData().nodes;
            newNodes.forEach(node => {
                const pos = posMap.get(node.id);
                if (pos) {
                    node.x = pos.x;
                    node.y = pos.y;
                    node.z = pos.z;
                    node.fx = pos.fx !== undefined ? pos.fx : pos.x;
                    node.fy = pos.fy !== undefined ? pos.fy : pos.y;
                    node.fz = pos.fz !== undefined ? pos.fz : pos.z;
                } else {
                    node.fx = undefined;
                    node.fy = undefined;
                    node.fz = undefined;
                }
            });
            Graph.refresh();
            document.getElementById('status').innerText = `显示: ${filtered.nodes.length} 节点, ${filtered.links.length} 边`;
        }

        function resetAllFilters() {
            // 保存摄像机位置
            const camPos = Graph ? Graph.cameraPosition() : null;
            // 重置变量
            currentLevel1 = 'all';
            currentLevel2 = 'all';
            currentLevel3 = 'all';
            currentLevel4 = 'all';
            currentKeyword = '';
            currentSort = 'default';
            currentAuthors.clear();
            selectedTags.clear();
            document.getElementById('sortSelect').value = 'default';
            document.getElementById('searchInput').value = '';
            buildSelectors();
            buildAdvancedPanel();
            updateAuthorUI();

            // 重建图实例（彻底清除固定位置）
            if (Graph) {
                const container = document.getElementById('graph-container');
                while (container.firstChild) container.removeChild(container.firstChild);
                Graph = null;
            }
            const container = document.getElementById('graph-container');
            Graph = ForceGraph3D()(container)
                .graphData(currentGraphData)
                .nodeLabel(n => {
                    const title = n.name.length > 40 ? n.name.slice(0,40)+'...' : n.name;
                    const sum = n.summary ? n.summary.slice(0,100)+'...' : '';
                    return `${title}\n\n${sum}`;
                })
                .nodeColor(n => getNodeColor(n))
                .nodeVal(n => {
                    if (currentSort === 'default') {
                        const deg = computeDegrees(currentGraphData).get(n.id) || 0;
                        return Math.min(4 + deg * 0.5, 12);
                    } else {
                        return 4 + (n._hot || getMockHotValue(n)) * 8;
                    }
                })
                .nodeRelSize(6)
                .linkWidth(l => l.score ? Math.min(l.score*3,5) : 2.5)
                .linkColor(l => l.score ? `rgba(100,150,200,${Math.min(l.score,1)})` : 'rgba(100,150,200,0.7)')
                .onNodeClick(showNodeDetail)
                .onNodeHover(node => {
                    if (!node) { Graph.nodeColor(n => getNodeColor(n)); return; }
                    Graph.nodeColor(d => d.id === node.id ? '#ffaa00' : getNodeColor(d));
                });
            if (camPos) Graph.cameraPosition(camPos);
            window.addEventListener('resize', () => { if(Graph) Graph.width(window.innerWidth).height(window.innerHeight); });
            const filtered = getFilteredData(); // 全部节点
            Graph.graphData(filtered);
            Graph.refresh();
            document.getElementById('status').innerText = `显示: ${filtered.nodes.length} 节点, ${filtered.links.length} 边`;
        }

            status.innerText = '加载数据...';
            try {
                const res = await fetch(`${API_BASE}/api/graph`);
                const data = await res.json();
                if (data.success) {
                    currentGraphData = data.data;
                    currentGraphData.nodes.forEach(n => {
                        n._hot = getMockHotValue(n);
                        n.author = n.author || '';
                    });
                    initRender();
                    status.innerText = `✅ 节点: ${currentGraphData.nodes.length}`;
                } else {
                    throw new Error('数据加载失败');
                }
            } catch (err) {
                console.error(err);
                status.innerText = '加载失败，请确保后端服务已启动 (python app_graph.py)';
            }
        }

        function initRender() {
            if (!currentGraphData.nodes.length) return;
            const container = document.getElementById('graph-container');
            Graph = ForceGraph3D()(container)
                .graphData(currentGraphData)
                .nodeLabel(n => {
                    const title = n.name.length > 40 ? n.name.slice(0,40)+'...' : n.name;
                    const sum = n.summary ? n.summary.slice(0,100)+'...' : '';
                    return `${title}\n\n${sum}`;
                })
                .nodeColor(n => getNodeColor(n))
                .nodeVal(n => {
                    if (currentSort === 'default') {
                        const deg = computeDegrees(currentGraphData).get(n.id) || 0;
                        return Math.min(4 + deg * 0.5, 12);
                    } else {
                        return 4 + getSortValue(n) * 8;
                    }
                })
                .nodeRelSize(6)
                .linkWidth(l => l.score ? Math.min(l.score*3,5) : 2.5)
                .linkColor(l => l.score ? `rgba(100,150,200,${Math.min(l.score,1)})` : 'rgba(100,150,200,0.7)')
                .onNodeClick(showNodeDetail)
                .onNodeHover(node => {
                    if (!node) { Graph.nodeColor(n => getNodeColor(n)); return; }
                    Graph.nodeColor(d => d.id === node.id ? '#ffaa00' : getNodeColor(d));
                });
            Graph.cameraPosition({x:0,y:0,z:100},{x:0,y:0,z:0},1000);
            window.addEventListener('resize', () => { if(Graph) Graph.width(window.innerWidth).height(window.innerHeight); });
            updateGraph();
        }

        function getSortValue(node) {
            if (currentSort === 'time') {
                const created = node.created || new Date().toISOString();
                return (new Date(created).getTime() % 1e12) / 1e12;
            } else if (currentSort === 'hot') {
                return node._hot || getMockHotValue(node);
            }
            return 0.5;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 绑定UI事件（省略，需完整实现）
            loadGraphData();
        });
    </script>
</body>
</html>
